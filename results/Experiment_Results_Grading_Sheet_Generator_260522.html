<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남한고등학교 미래과학연구단 실험 결과 채점표 작성기 (26. 05. 22)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --surface2: #181c24;
            --surface3: #1f2430;
            --border: #2a2f3d;
            --border2: #343b4f;
            --accent: #4f8ef7;
            --accent2: #7c5cfc;
            --accent3: #f75c7e;
            --accent-green: #3ddba3;
            --accent-yellow: #f7c94f;
            --text: #e8eaf0;
            --text2: #9aa0b4;
            --text3: #5a6075;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 48px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BG decoration */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 142, 247, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 92, 252, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px 80px;
        }

        /* Header */
        .header {
            padding: 48px 0 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }

        .header-left {}

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(79, 142, 247, 0.12);
            border: 1px solid rgba(79, 142, 247, 0.25);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 16px;
        }

        .header-title {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, #e8eaf0 0%, #9aa0b4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-sub {
            color: var(--text3);
            font-size: 14px;
            margin-top: 8px;
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 32px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            flex: 1;
            min-width: 80px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text2);
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            text-align: center;
        }

        .tab:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .tab.active {
            background: var(--surface3);
            color: var(--text);
            font-weight: 600;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        /* Panels */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* Group selector */
        .group-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            align-items: center;
        }

        .group-label {
            color: var(--text3);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-right: 4px;
        }

        .group-btn {
            padding: 7px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .group-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .group-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        /* Score Overview */
        .score-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .score-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--card-color, var(--accent));
            opacity: 0.6;
        }

        .score-card:hover {
            border-color: var(--border2);
        }

        .score-card-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            margin-bottom: 6px;
        }

        .score-card-value {
            font-size: 26px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .score-card-max {
            font-size: 13px;
            font-weight: 400;
            color: var(--text3);
        }

        .score-card-sub {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
        }

        .score-total-card {
            background: linear-gradient(135deg, rgba(79, 142, 247, 0.12), rgba(124, 92, 252, 0.12));
            border-color: rgba(79, 142, 247, 0.3);
        }

        .score-total-card .score-card-value {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
        }

        /* Scoring sections */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .section:hover {
            border-color: var(--border2);
        }

        .section-header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .section-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .section-num {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        .section-info {
            flex: 1;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .section-desc {
            font-size: 12px;
            color: var(--text3);
            margin-top: 2px;
        }

        .section-score-display {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-deduct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent3);
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }

        .section-score-pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            min-width: 70px;
            text-align: center;
            transition: all 0.3s;
        }

        .section-chevron {
            color: var(--text3);
            font-size: 12px;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .section.open .section-chevron {
            transform: rotate(180deg);
        }

        .section-body {
            display: none;
            padding: 0 24px 20px;
            border-top: 1px solid var(--border);
        }

        .section.open .section-body {
            display: block;
        }

        /* Deduction items */
        .deduct-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 16px;
        }

        .deduct-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            background: var(--surface2);
            user-select: none;
        }

        .deduct-item:hover {
            border-color: var(--border2);
            background: var(--surface3);
        }

        .deduct-item.checked {
            background: rgba(247, 92, 126, 0.08);
            border-color: rgba(247, 92, 126, 0.25);
        }

        .deduct-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 2px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
            font-size: 10px;
            color: #fff;
        }

        .deduct-item.checked .deduct-checkbox {
            background: var(--accent3);
            border-color: var(--accent3);
        }

        .deduct-label {
            flex: 1;
            font-size: 13px;
            color: var(--text2);
            transition: color 0.15s;
        }

        .deduct-item.checked .deduct-label {
            color: var(--text);
        }

        .deduct-points {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent3);
            flex-shrink: 0;
        }

        /* Major errors */
        .major-errors-section {
            background: rgba(247, 92, 126, 0.05);
            border: 1px solid rgba(247, 92, 126, 0.15);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .major-errors-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent3);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .major-errors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px;
        }

        .major-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .major-item:hover {
            border-color: rgba(247, 92, 126, 0.3);
        }

        .major-item.checked {
            background: rgba(247, 92, 126, 0.1);
            border-color: rgba(247, 92, 126, 0.35);
        }

        .major-points {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent3);
            margin-left: auto;
        }

        /* ── Qualitative tab ── */
        .qual-intro {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
        }

        .qual-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .evaluator-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .evaluator-card:hover {
            border-color: var(--border2);
        }

        .evaluator-header {
            padding: 14px 18px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .evaluator-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .evaluator-name-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            min-width: 0;
        }

        .evaluator-name-input::placeholder {
            color: var(--text3);
        }

        .evaluator-remove {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 16px;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .evaluator-remove:hover {
            color: var(--accent3);
            background: rgba(247, 92, 126, 0.1);
        }

        .evaluator-scores {
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .qual-score-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qual-score-label {
            font-size: 12px;
            color: var(--text2);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .qual-score-input {
            width: 60px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 5px 6px;
            outline: none;
            transition: border-color 0.15s;
            flex-shrink: 0;
        }

        .qual-score-input:focus {
            border-color: var(--accent);
        }

        .qual-score-max {
            font-size: 11px;
            color: var(--text3);
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
            width: 28px;
        }

        .add-evaluator-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 40px;
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text3);
            font-size: 14px;
            font-family: 'Pretendard', sans-serif;
            transition: all 0.2s;
        }

        .add-evaluator-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(79, 142, 247, 0.04);
        }

        .qual-avg-table {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 8px;
        }

        .qual-avg-table-title {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            padding: 10px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
            font-family: 'JetBrains Mono', monospace;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.015);
            color: var(--text);
        }

        .td-label {
            font-family: 'Pretendard', sans-serif;
            color: var(--text);
            font-weight: 500;
        }

        .td-avg {
            color: var(--accent-green);
            font-weight: 700;
        }

        /* Summary tab */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .summary-group-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .summary-group-header {
            padding: 14px 18px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .summary-group-name {
            font-size: 14px;
            font-weight: 700;
        }

        .summary-group-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
        }

        .summary-rows {
            padding: 12px 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 18px;
            font-size: 12px;
        }

        .summary-row-label {
            color: var(--text2);
        }

        .summary-row-val {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--text);
        }

        .summary-row-val.neg {
            color: var(--accent3);
        }

        .summary-row-val.pos {
            color: var(--accent-green);
        }

        /* Bar chart */
        .bar-chart-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }

        .bar-chart-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .bar-label {
            width: 120px;
            font-size: 12px;
            color: var(--text2);
            text-align: right;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-track {
            flex: 1;
            height: 10px;
            background: var(--surface2);
            border-radius: 100px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bar-val {
            width: 50px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            text-align: right;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: var(--border2);
            color: var(--text);
            background: var(--surface3);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6ba0f9;
            border-color: #6ba0f9;
            color: #fff;
        }

        .btn-danger {
            background: rgba(247, 92, 126, 0.1);
            border-color: rgba(247, 92, 126, 0.3);
            color: var(--accent3);
        }

        .btn-danger:hover {
            background: rgba(247, 92, 126, 0.18);
        }

        .btn-green {
            background: rgba(61, 219, 163, 0.1);
            border-color: rgba(61, 219, 163, 0.3);
            color: var(--accent-green);
        }

        .btn-green:hover {
            background: rgba(61, 219, 163, 0.18);
        }

        /* Notices */
        .notice {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(79, 142, 247, 0.08);
            border: 1px solid rgba(79, 142, 247, 0.2);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 16px;
        }

        /* Range with label */
        .range-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .range-row input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            outline: none;
        }

        .range-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent3);
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(247, 92, 126, 0.2);
        }

        .range-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent3);
            min-width: 36px;
            text-align: right;
        }

        /* Checklist section (features) */
        .checklist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            border: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
            font-size: 13px;
            color: var(--text2);
        }

        .check-item:hover {
            border-color: var(--border2);
            color: var(--text);
        }

        .check-item.pass {
            background: rgba(61, 219, 163, 0.08);
            border-color: rgba(61, 219, 163, 0.25);
            color: var(--accent-green);
        }

        .check-item.fail {
            background: rgba(247, 92, 126, 0.08);
            border-color: rgba(247, 92, 126, 0.25);
            color: var(--accent3);
        }

        .check-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border2);
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .check-item.pass .check-dot {
            background: var(--accent-green);
        }

        .check-item.fail .check-dot {
            background: var(--accent3);
        }

        /* Group name input */
        .group-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border2);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 700;
            outline: none;
            padding: 2px 4px;
            transition: border-color 0.2s;
        }

        .group-name-input:focus {
            border-bottom-color: var(--accent);
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        /* Spinner / loading */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .icon-spin {
            animation: spin 1s linear infinite;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app {
                padding: 0 12px 60px;
            }

            .header {
                padding: 28px 0 24px;
            }

            .score-overview {
                grid-template-columns: repeat(2, 1fr);
            }

            .bar-label {
                width: 80px;
                font-size: 11px;
            }
        }
    </style>
</head>

    <script>
        /* ═══════════════════════════════════════════

        ═══════════════════════════════════════════ */

        const CATEGORIES = [
            {
                id: 'func', title: '기능 구현 완성도', max: 25, color: '#4f8ef7',

            },
            {
                id: 'mobile', title: '모바일 반응형', max: 10, color: '#f7c94f',
                desc: '모바일 화면 최적화 수준',
                items: [
                    { label: '모바일 레이아웃 깨짐', pts: -5 },

            {

                items: [
                    { label: '모든 코드 한 함수 작성', pts: -4 },

                    { label: '전역 변수 남용', pts: -2 },
                    { label: '비효율 반복 구조', pts: -2 },
                    { label: '로직 흐름 불명확', pts: -2 },
                ]
            },
            {
                id: 'read', title: '코드 가독성', max: 5, color: '#f75c7e',
                desc: '사람이 읽기 쉬운 코드',
                items: [
                    { label: '변수명 의미 불명확', pts: -1 },
                    { label: '주석 전혀 없음', pts: -2 },
                    { label: '들여쓰기 불량', pts: -1 },
                    { label: '코드 정렬 불량', pts: -1 },
                    { label: '지나치게 긴 함수', pts: -1 },
                ]
            },
            {
                id: 'maint', title: '유지보수성', max: 5, color: '#4fc7f7',
                desc: '수정·기능 추가 용이성',
                items: [
                    { label: '기능 간 결합도 과다', pts: -2 },
                    { label: '하드코딩 과다', pts: -2 },
                    { label: '재사용 구조 부족', pts: -1 },
                    { label: '스타일 중복', pts: -1 },
                ]
            },
            {
                id: 'a11y', title: '접근성', max: 5, color: '#da7ffa',
                desc: '누구나 사용 가능한 UI',
                items: [
                    { label: '버튼 식별 어려움', pts: -2 },
                    { label: '입력창 placeholder 없음', pts: -1 },
                    { label: '색상 대비 부족', pts: -2 },
                    { label: '클릭 영역 지나치게 작음', pts: -1 },
                    { label: '키보드 사용 고려 없음', pts: -1 },
                ]
            },
            {
                id: 'stable', title: '오류 안정성', max: 10, color: '#f74f4f',
                desc: '실행 안정성과 버그 여부',
                items: [
                    { label: '콘솔 에러 발생 (경미)', pts: -2 },
                    { label: '콘솔 에러 발생 (심각)', pts: -5 },
                    { label: '기능 중단 버그', pts: -5 },
                    { label: '예외 처리 없음', pts: -2 },
                    { label: '입력 이상 시 오작동', pts: -2 },
                    { label: 'undefined/null 오류', pts: -2 },
                ]
            },
            {
                id: 'creative', title: '창의성 및 완성도', max: 5, color: '#fac74f',
                desc: '실제 서비스 느낌',
                items: [
                    { label: '지나치게 단순한 UI', pts: -2 },
                    { label: '상용 서비스 느낌 부족', pts: -2 },
                    { label: '인터랙션 부족', pts: -1 },
                    { label: '디테일 부족', pts: -1 },
                ]
            },
        ];

        const MAJOR_ERRORS = [
            { label: '실행 자체 불가', pts: -15 },
            { label: 'HTML 깨짐', pts: -5 },
            { label: 'JS 문법 오류', pts: -10 },
            { label: 'CSS 적용 실패', pts: -5 },
            { label: '주요 기능 2개 이상 미작동', pts: -10 },
        ];

        const FEATURES = ['익명 건의 작성', '목록 출력', '좋아요', '검색', '삭제', '다크모드', 'localStorage 저장', '입력 유효성 검사'];

        const QUAL_ITEMS = [
            { id: 'ui_q', label: 'UI 디자인', max: 15 },
            { id: 'ux_q', label: 'UX 자연스러움', max: 10 },
            { id: 'creative_q', label: '창의성/완성도', max: 5 },
        ];

        const GROUP_COLORS = ['#4f8ef7', '#7c5cfc', '#3ddba3', '#f7c94f', '#f75c7e', '#f78c4f', '#da7ffa', '#4fc7f7'];

        /* State */
        let state = {
            currentGroup: 0,
            groups: [
                { name: '그룹 A', checks: {}, majorChecks: {}, features: {}, qualEvaluators: [] },
                { name: '그룹 B', checks: {}, majorChecks: {}, features: {}, qualEvaluators: [] },
                { name: '그룹 C', checks: {}, majorChecks: {}, features: {}, qualEvaluators: [] },
                { name: '그룹 D', checks: {}, majorChecks: {}, features: {}, qualEvaluators: [] },
            ],
            activeTab: 'scoring',
            qualCurrentGroup: 0,
        };

        function saveState() {
            try { localStorage.setItem('scoring_state', JSON.stringify(state)); } catch (e) { }
        }
        function loadState() {
            try {
                const s = localStorage.getItem('scoring_state');
                if (s) state = JSON.parse(s);
            } catch (e) { }
        }

        /* ═══════════════════════════════════════════
           SCORING CALCULATIONS
        ═══════════════════════════════════════════ */
        function calcCategoryScore(groupIdx, catId) {
            const cat = CATEGORIES.find(c => c.id === catId);
            const grp = state.groups[groupIdx];
            let deduct = 0;
            cat.items.forEach((item, i) => {
                if (grp.checks[catId]?.[i]) deduct += item.pts;
            });
            return Math.max(0, cat.max + deduct);
        }

        function calcMajorDeduct(groupIdx) {
            const grp = state.groups[groupIdx];
            let deduct = 0;
            MAJOR_ERRORS.forEach((e, i) => {
                if (grp.majorChecks[i]) deduct += e.pts;
            });
            return deduct;
        }

        function calcTotal(groupIdx) {
            let sum = 0;
            CATEGORIES.forEach(cat => { sum += calcCategoryScore(groupIdx, cat.id); });
            sum += calcMajorDeduct(groupIdx);
            return Math.max(0, sum);
        }

        function calcQualAvg(groupIdx) {
            const grp = state.groups[groupIdx];
            const avgs = {};
            QUAL_ITEMS.forEach(qi => {
                const vals = (grp.qualEvaluators || []).map(ev => parseFloat(ev.scores?.[qi.id] || 0)).filter(v => !isNaN(v));
                avgs[qi.id] = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length) : 0;
            });
            return avgs;
        }

        /* ═══════════════════════════════════════════
           RENDER HELPERS
        ═══════════════════════════════════════════ */
        function getGroupColor(i) { return GROUP_COLORS[i % GROUP_COLORS.length]; }

        function renderGroupBtns(containerId, currentKey) {
            const el = document.getElementById(containerId);
            el.innerHTML = '';
            state.groups.forEach((g, i) => {
                const btn = document.createElement('button');
                btn.className = 'group-btn' + (state[currentKey] === i ? ' active' : '');
                btn.style.borderColor = state[currentKey] === i ? getGroupColor(i) : '';
                btn.style.background = state[currentKey] === i ? getGroupColor(i) : '';
                btn.style.color = state[currentKey] === i ? '#fff' : '';
                btn.textContent = g.name;
                btn.onclick = () => { state[currentKey] = i; saveState(); renderAll(); };
                el.appendChild(btn);
            });
        }

        function renderScoreOverview() {
            const gi = state.currentGroup;
            const el = document.getElementById('scoreOverview');
            el.innerHTML = '';

            const total = calcTotal(gi);
            const totalCard = document.createElement('div');
            totalCard.className = 'score-card score-total-card';
            totalCard.style.setProperty('--card-color', 'linear-gradient(135deg,#4f8ef7,#7c5cfc)');
            totalCard.innerHTML = `
    <div class="score-card-label">총점</div>
    <div class="score-card-value">${total}<span class="score-card-max"> /100</span></div>
    <div class="score-card-sub">${state.groups[gi].name}</div>
  `;
            el.appendChild(totalCard);

            CATEGORIES.forEach(cat => {
                const score = calcCategoryScore(gi, cat.id);
                const grp = state.groups[gi];
                let deduct = 0;
                cat.items.forEach((item, i) => { if (grp.checks[cat.id]?.[i]) deduct += item.pts; });
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.setProperty('--card-color', cat.color);
                card.innerHTML = `
      <div class="score-card-label">${cat.title}</div>
      <div class="score-card-value" style="font-size:20px;color:${cat.color}">${score}<span class="score-card-max"> /${cat.max}</span></div>
      <div class="score-card-sub" style="color:var(--accent3)">${deduct < 0 ? deduct + '점 감점' : '감점 없음'}</div>
    `;
                el.appendChild(card);
            });

            const majorDeduct = calcMajorDeduct(gi);
            if (majorDeduct !== 0) {
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.background = 'rgba(247,92,126,0.06)';
                card.style.setProperty('--card-color', '#f75c7e');
                card.innerHTML = `
      <div class="score-card-label">중대 오류 감점</div>
      <div class="score-card-value" style="font-size:20px;color:var(--accent3)">${majorDeduct}</div>
      <div class="score-card-sub">추가 감점</div>
    `;
                el.appendChild(card);
            }
        }

        function renderFeatureChecklist() {
            const gi = state.currentGroup;
            const grp = state.groups[gi];
            const el = document.getElementById('featureChecklist');
            el.innerHTML = '<div class="checklist-grid" id="featureGrid"></div>';
            const grid = document.getElementById('featureGrid');
            FEATURES.forEach((f, i) => {
                const status = grp.features[i] || 'none';
                const item = document.createElement('div');
                item.className = 'check-item' + (status === 'pass' ? ' pass' : status === 'fail' ? ' fail' : '');
                item.innerHTML = `<div class="check-dot"></div><span>${f}</span>`;
                item.onclick = () => {
                    const cur = grp.features[i] || 'none';
                    grp.features[i] = cur === 'none' ? 'pass' : cur === 'pass' ? 'fail' : 'none';
                    saveState(); renderFeatureChecklist();
                };
                grid.appendChild(item);
            });
        }

        function renderScoringSections() {
            const gi = state.currentGroup;
            const grp = state.groups[gi];
            const el = document.getElementById('scoringSections');
            el.innerHTML = '';

            CATEGORIES.forEach((cat, ci) => {
                const score = calcCategoryScore(gi, cat.id);
                let deduct = 0;
                cat.items.forEach((item, i) => { if (grp.checks[cat.id]?.[i]) deduct += item.pts; });

                const sec = document.createElement('div');
                sec.className = 'section';
                sec.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-num" style="background:${cat.color}22;color:${cat.color}">${ci + 1}</div>
        <div class="section-info">
          <div class="section-title">${cat.title}</div>
          <div class="section-desc">${cat.desc} — 만점 ${cat.max}점</div>
        </div>
        <div class="section-score-display">
          <div class="section-deduct" id="deduct-${cat.id}">${deduct < 0 ? deduct + 'pt' : ''}</div>
          <div class="section-score-pill" id="pill-${cat.id}" style="color:${cat.color};border-color:${cat.color}44">${score} / ${cat.max}</div>
        </div>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="deduct-list" id="list-${cat.id}"></div>
      </div>
    `;
                el.appendChild(sec);

                const list = sec.querySelector(`#list-${cat.id}`);
                cat.items.forEach((item, i) => {
                    const checked = !!(grp.checks[cat.id]?.[i]);
                    const d = document.createElement('div');
                    d.className = 'deduct-item' + (checked ? ' checked' : '');
                    d.innerHTML = `
        <div class="deduct-checkbox">${checked ? '✓' : ''}</div>
        <div class="deduct-label">${item.label}</div>
        <div class="deduct-points">${item.pts}pt</div>
      `;
                    d.onclick = () => {
                        if (!grp.checks[cat.id]) grp.checks[cat.id] = {};
                        grp.checks[cat.id][i] = !grp.checks[cat.id][i];
                        saveState();
                        // partial re-render
                        const newChecked = grp.checks[cat.id][i];
                        d.classList.toggle('checked', newChecked);
                        d.querySelector('.deduct-checkbox').textContent = newChecked ? '✓' : '';
                        updateCategoryDisplay(gi, cat.id);
                        updateTotalDisplay(gi);
                    };
                    list.appendChild(d);
                });
            });
        }

        function updateCategoryDisplay(gi, catId) {
            const score = calcCategoryScore(gi, catId);
            const cat = CATEGORIES.find(c => c.id === catId);
            const grp = state.groups[gi];
            let deduct = 0;
            cat.items.forEach((item, i) => { if (grp.checks[catId]?.[i]) deduct += item.pts; });
            const pillEl = document.getElementById(`pill-${catId}`);
            const deductEl = document.getElementById(`deduct-${catId}`);
            if (pillEl) pillEl.textContent = `${score} / ${cat.max}`;
            if (deductEl) deductEl.textContent = deduct < 0 ? deduct + 'pt' : '';
            // Update overview card
            renderScoreOverview();
        }

        function updateTotalDisplay(gi) {
            // covered by renderScoreOverview
        }

        function renderMajorErrors() {
            const gi = state.currentGroup;
            const grp = state.groups[gi];
            const el = document.getElementById('majorErrors');
            el.innerHTML = `<div class="major-errors-title">⚠️ 중대 오류 추가 감점</div><div class="major-errors-grid" id="majorGrid"></div>`;
            const grid = document.getElementById('majorGrid');
            MAJOR_ERRORS.forEach((e, i) => {
                const checked = !!grp.majorChecks[i];
                const item = document.createElement('div');
                item.className = 'major-item' + (checked ? ' checked' : '');
                item.innerHTML = `
      <div class="deduct-checkbox" style="width:16px;height:16px;">${checked ? '✓' : ''}</div>
      <span style="font-size:13px;color:${checked ? 'var(--accent3)' : 'var(--text2)'};flex:1">${e.label}</span>
      <span class="major-points">${e.pts}pt</span>
    `;
                item.onclick = () => {
                    grp.majorChecks[i] = !grp.majorChecks[i];
                    saveState();
                    renderMajorErrors();
                    renderScoreOverview();
                };
                grid.appendChild(item);
            });
        }

        /* ═══════════════════════════════════════════
           QUALITATIVE TAB
        ═══════════════════════════════════════════ */
        const AVATAR_COLORS = ['#4f8ef7', '#7c5cfc', '#3ddba3', '#f7c94f', '#f75c7e', '#f78c4f'];

        function renderQualPanel() {
            const gi = state.qualCurrentGroup;
            const grp = state.groups[gi];
            if (!grp.qualEvaluators) grp.qualEvaluators = [];

            renderGroupBtns('qualGroupBtns', 'qualCurrentGroup');

            const el = document.getElementById('qualEvaluators');
            el.innerHTML = '';

            grp.qualEvaluators.forEach((ev, ei) => {
                const card = document.createElement('div');
                card.className = 'evaluator-card';
                const initials = (ev.name || '?').charAt(0).toUpperCase();
                const color = AVATAR_COLORS[ei % AVATAR_COLORS.length];

                let scoresHtml = QUAL_ITEMS.map(qi => `
      <div class="qual-score-row">
        <div class="qual-score-label">${qi.label}</div>
        <input class="qual-score-input" type="number" min="0" max="${qi.max}"
          value="${ev.scores?.[qi.id] || ''}" placeholder="0"
          oninput="updateEvalScore(${gi},${ei},'${qi.id}',this.value)">
        <div class="qual-score-max">/${qi.max}</div>
      </div>
    `).join('');

                card.innerHTML = `
      <div class="evaluator-header">
        <div class="evaluator-avatar" style="background:${color}">${initials}</div>
        <input class="evaluator-name-input" value="${ev.name || ''}" placeholder="평가자 이름"
          oninput="updateEvalName(${gi},${ei},this.value)">
        <button class="evaluator-remove" onclick="removeEvaluator(${gi},${ei})">✕</button>
      </div>
      <div class="evaluator-scores">${scoresHtml}</div>
    `;
                el.appendChild(card);
            });

            renderQualAvgTable(gi);
        }

        function updateEvalName(gi, ei, val) {
            state.groups[gi].qualEvaluators[ei].name = val; saveState();
            // refresh avatar
            renderQualPanel();
        }
        function updateEvalScore(gi, ei, qid, val) {
            const qi = QUAL_ITEMS.find(q => q.id === qid);
            let v = parseFloat(val);
            if (isNaN(v)) v = 0;
            v = Math.min(qi.max, Math.max(0, v));
            if (!state.groups[gi].qualEvaluators[ei].scores) state.groups[gi].qualEvaluators[ei].scores = {};
            state.groups[gi].qualEvaluators[ei].scores[qid] = v;
            saveState();
            renderQualAvgTable(gi);
        }
        function addEvaluator() {
            const gi = state.qualCurrentGroup;
            if (!state.groups[gi].qualEvaluators) state.groups[gi].qualEvaluators = [];
            const names = ['평가자 A', '평가자 B', '평가자 C', '평가자 D', '평가자 E'];
            const name = names[state.groups[gi].qualEvaluators.length] || `평가자 ${state.groups[gi].qualEvaluators.length + 1}`;
            state.groups[gi].qualEvaluators.push({ name, scores: {} });
            saveState(); renderQualPanel();
        }
        function removeEvaluator(gi, ei) {
            state.groups[gi].qualEvaluators.splice(ei, 1);
            saveState(); renderQualPanel();
        }

        function renderQualAvgTable(gi) {
            const grp = state.groups[gi];
            const evaluators = grp.qualEvaluators || [];

            // Headers
            const hEl = document.getElementById('qualAvgEvaluatorHeaders');
            hEl.innerHTML = '';
            const headRow = hEl.closest('tr');
            // clear dynamic headers
            while (headRow.children.length > 2) headRow.removeChild(headRow.children[2]);
            evaluators.forEach(ev => {
                const th = document.createElement('th');
                th.textContent = ev.name || '?';
                headRow.insertBefore(th, headRow.lastElementChild);
            });

            const tbody = document.getElementById('qualAvgBody');
            tbody.innerHTML = '';
            QUAL_ITEMS.forEach(qi => {
                const vals = evaluators.map(ev => parseFloat(ev.scores?.[qi.id] || 0));
                const avg = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '-';
                const tr = document.createElement('tr');
                let cells = `<td class="td-label">${qi.label}</td><td>${qi.max}</td>`;
                vals.forEach(v => { cells += `<td>${v}</td>`; });
                cells += `<td class="td-avg">${avg}</td>`;
                tr.innerHTML = cells;
                tbody.appendChild(tr);
            });

            // total row
            const totals = evaluators.map(ev => {
                return QUAL_ITEMS.reduce((s, qi) => s + (parseFloat(ev.scores?.[qi.id] || 0)), 0);
            });
            const totalAvg = totals.length ? (totals.reduce((a, b) => a + b, 0) / totals.length).toFixed(1) : '-';
            const tr = document.createElement('tr');
            tr.style.borderTop = '2px solid var(--border2)';
            let cells = `<td class="td-label" style="font-weight:700">합계</td><td style="font-weight:700">30</td>`;
            totals.forEach(v => { cells += `<td style="font-weight:700">${v}</td>`; });
            cells += `<td class="td-avg" style="font-size:15px;font-weight:800">${totalAvg}</td>`;
            tr.innerHTML = cells;
            tbody.appendChild(tr);
        }

        /* ═══════════════════════════════════════════
           SUMMARY TAB
        ═══════════════════════════════════════════ */
        function renderSummary() {
            renderSummaryBars();
            renderSummaryCards();
            renderSummaryTable();
        }

        function renderSummaryBars() {
            const el = document.getElementById('summaryBars');
            el.innerHTML = '<div class="bar-chart-title">그룹별 총점 비교</div>';
            const max = 100;
            state.groups.forEach((g, i) => {
                const total = calcTotal(i);
                const pct = (total / max * 100).toFixed(1);
                const color = getGroupColor(i);
                const row = document.createElement('div');
                row.className = 'bar-row';
                row.innerHTML = `
      <div class="bar-label">${g.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-val">${total}</div>
    `;
                el.appendChild(row);
            });
        }

        function renderSummaryCards() {
            const el = document.getElementById('summaryCards');
            el.innerHTML = '';
            state.groups.forEach((g, i) => {
                const total = calcTotal(i);
                const color = getGroupColor(i);
                const card = document.createElement('div');
                card.className = 'summary-group-card';
                let rows = '';
                CATEGORIES.forEach(cat => {
                    const s = calcCategoryScore(i, cat.id);
                    rows += `
        <div class="summary-row">
          <span class="summary-row-label">${cat.title}</span>
          <span class="summary-row-val">${s}/${cat.max}</span>
        </div>`;
                });
                const md = calcMajorDeduct(i);
                if (md !== 0) rows += `<div class="summary-row"><span class="summary-row-label">중대 오류</span><span class="summary-row-val neg">${md}</span></div>`;
                card.innerHTML = `
      <div class="summary-group-header">
        <div class="summary-group-name" style="color:${color}">${g.name}</div>
        <div class="summary-group-total" style="color:${color}">${total}점</div>
      </div>
      <div class="summary-rows">${rows}</div>
    `;
                el.appendChild(card);
            });
        }

        function renderSummaryTable() {
            const thead = document.getElementById('summaryTableHead');
            const tbody = document.getElementById('summaryTableBody');
            let headHtml = '<tr><th>항목</th><th>만점</th>';
            state.groups.forEach(g => { headHtml += `<th>${g.name}</th>`; });
            headHtml += '</tr>';
            thead.innerHTML = headHtml;

            tbody.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const tr = document.createElement('tr');
                let cells = `<td class="td-label">${cat.title}</td><td>${cat.max}</td>`;
                state.groups.forEach((g, i) => {
                    const s = calcCategoryScore(i, cat.id);
                    cells += `<td style="color:${cat.color};font-weight:600">${s}</td>`;
                });
                tr.innerHTML = cells; tbody.appendChild(tr);
            });

            // Major deduct row
            const mdTr = document.createElement('tr');
            let mdCells = `<td class="td-label" style="color:var(--accent3)">중대 오류 감점</td><td>-</td>`;
            state.groups.forEach((g, i) => { mdCells += `<td style="color:var(--accent3)">${calcMajorDeduct(i) || 0}</td>`; });
            mdTr.innerHTML = mdCells; tbody.appendChild(mdTr);

            // Total
            const totalTr = document.createElement('tr');
            totalTr.style.borderTop = '2px solid var(--border2)';
            let tc = `<td class="td-label" style="font-weight:800;font-size:14px">총점</td><td style="font-weight:700">100</td>`;
            state.groups.forEach((g, i) => {
                tc += `<td style="font-weight:800;font-size:15px;color:var(--accent-green)">${calcTotal(i)}</td>`;
            });
            totalTr.innerHTML = tc; tbody.appendChild(totalTr);
        }

        /* ═══════════════════════════════════════════
           INTERACTIONS
        ═══════════════════════════════════════════ */
        function toggleSection(header) {
            const sec = header.closest('.section');
            sec.classList.toggle('open');
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            btn.classList.add('active');
            state.activeTab = id;
            if (id === 'qualitative') renderQualPanel();
            if (id === 'summary') renderSummary();
        }

        function addGroup() {
            const names = ['그룹 E', '그룹 F', '그룹 G', '그룹 H'];
            const name = names[state.groups.length - 4] || `그룹 ${state.groups.length + 1}`;
            state.groups.push({ name, checks: {}, majorChecks: {}, features: {}, qualEvaluators: [] });
            state.currentGroup = state.groups.length - 1;
            saveState(); renderAll();
        }

        function resetCurrent() {
            const gi = state.currentGroup;
            if (!confirm(`"${state.groups[gi].name}" 그룹을 초기화하시겠습니까?`)) return;
            state.groups[gi] = { name: state.groups[gi].name, checks: {}, majorChecks: {}, features: {}, qualEvaluators: [] };
            saveState(); renderAll();
        }

        /* ═══════════════════════════════════════════
           CSV EXPORT
        ═══════════════════════════════════════════ */
        function downloadCSV() {
            let csv = '\uFEFF'; // BOM for Korean
            csv += '항목,만점,' + state.groups.map(g => g.name).join(',') + '\n';

            CATEGORIES.forEach(cat => {
                const row = [cat.title, cat.max];
                state.groups.forEach((g, i) => row.push(calcCategoryScore(i, cat.id)));
                csv += row.join(',') + '\n';

                // Deduction details
                cat.items.forEach((item, itemIdx) => {
                    const row2 = [`  └ ${item.label}`, item.pts];
                    state.groups.forEach((g, i) => {
                        row2.push(g.checks[cat.id]?.[itemIdx] ? item.pts : 0);
                    });
                    csv += row2.join(',') + '\n';
                });
            });

            csv += '중대 오류 감점,-,' + state.groups.map((_, i) => calcMajorDeduct(i)).join(',') + '\n';

            MAJOR_ERRORS.forEach((e, ei) => {
                const row = [`  └ ${e.label}`, e.pts];
                state.groups.forEach((g) => row.push(g.majorChecks[ei] ? e.pts : 0));
                csv += row.join(',') + '\n';
            });

            csv += '총점,100,' + state.groups.map((_, i) => calcTotal(i)).join(',') + '\n\n';

            // Feature checklist
            csv += '기능 체크리스트,,';
            csv += state.groups.map(g => g.name).join(',') + '\n';
            FEATURES.forEach((f, fi) => {
                const row = [f, ''];
                state.groups.forEach(g => row.push(g.features[fi] || '미확인'));
                csv += row.join(',') + '\n';
            });
            csv += '\n';

            // Qualitative
            csv += '정성 평가,,';
            csv += state.groups.map(g => g.name).join(',') + '\n';
            QUAL_ITEMS.forEach(qi => {
                state.groups.forEach((g, gi) => {
                    (g.qualEvaluators || []).forEach(ev => {
                        csv += `${qi.label} (${ev.name || '?'}),${qi.max},${ev.scores?.[qi.id] || 0}\n`;
                    });
                });

                const row = [`${qi.label} 평균`, qi.max];
                state.groups.forEach((_, gi) => {
                    const avgs = calcQualAvg(gi);
                    row.push(avgs[qi.id].toFixed(1));
                });
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = '프롬프트_실험_채점결과.csv';
            a.click(); URL.revokeObjectURL(url);
        }

        /* ═══════════════════════════════════════════
           MAIN RENDER
        ═══════════════════════════════════════════ */
        function renderAll() {
            renderGroupBtns('groupBtns', 'currentGroup');
            renderScoreOverview();
            renderFeatureChecklist();
            renderScoringSections();
            renderMajorErrors();
            if (state.activeTab === 'qualitative') renderQualPanel();
            if (state.activeTab === 'summary') renderSummary();
        }

        loadState();
        renderAll();

        // Keep qual group in sync
        document.addEventListener('click', e => {
            if (e.target.closest('#groupBtns')) {
                state.qualCurrentGroup = state.currentGroup;
            }
        });
    </script>
</body>

</html>
