<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학교 온라인 건의함</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Pretendard', sans-serif;
    }

    body{
      background:#f4f7fb;
      color:#222;
      min-height:100vh;
      padding:40px 20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .title{
      text-align:center;
      margin-bottom:30px;
    }

    .title h1{
      font-size:42px;
      color:#1f4ea3;
      margin-bottom:10px;
    }

    .title p{
      color:#666;
      font-size:16px;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      margin-bottom:30px;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
    }

    input, select, textarea{
      width:100%;
      padding:14px;
      border:1px solid #d5dbe7;
      border-radius:12px;
      font-size:15px;
      transition:0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus{
      outline:none;
      border-color:#3b82f6;
      box-shadow:0 0 0 4px rgba(59,130,246,0.15);
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .checkbox-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }

    .checkbox-wrap input{
      width:auto;
    }

    button{
      border:none;
      padding:14px 20px;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:700;
      transition:0.2s;
    }

    .submit-btn{
      background:#2563eb;
      color:white;
      width:100%;
    }

    .submit-btn:hover{
      background:#1746a2;
    }

    .list-title{
      margin-bottom:18px;
      color:#1f4ea3;
    }

    .suggestion{
      border:1px solid #e2e8f0;
      border-radius:14px;
      padding:20px;
      margin-bottom:16px;
      background:#fafcff;
    }

    .suggestion-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
      gap:10px;
      flex-wrap:wrap;
    }

    .category{
      background:#dbeafe;
      color:#1e40af;
      padding:6px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    .meta{
      color:#666;
      font-size:13px;
    }

    .suggestion h3{
      margin-bottom:10px;
      color:#222;
    }

    .suggestion p{
      line-height:1.6;
      color:#444;
    }

    .empty{
      text-align:center;
      color:#888;
      padding:30px 0;
    }

    .delete-btn{
      margin-top:15px;
      background:#ef4444;
      color:white;
      padding:10px 14px;
      font-size:14px;
    }

    .delete-btn:hover{
      background:#c62828;
    }

    footer{
      text-align:center;
      margin-top:20px;
      color:#888;
      font-size:14px;
    }

    @media (max-width:700px){
      .row{
        grid-template-columns:1fr;
      }

      .title h1{
        font-size:32px;
      }

      .card{
        padding:22px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">
      <h1>🏫 학교 온라인 건의함</h1>
      <p>학생들의 의견을 자유롭게 남겨주세요.</p>
    </div>

    <!-- 작성 폼 -->
    <div class="card">
      <form id="suggestionForm">

        <div class="row">
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="name" placeholder="이름 입력">
          </div>

          <div class="form-group">
            <label>카테고리</label>
            <select id="category">
              <option value="급식">급식</option>
              <option value="시설">시설</option>
              <option value="수업">수업</option>
              <option value="행사">행사</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>제목</label>
          <input type="text" id="title" placeholder="건의 제목 입력" required>
        </div>

        <div class="form-group">
          <label>내용</label>
          <textarea id="content" placeholder="건의 내용을 입력하세요." required></textarea>
        </div>

        <div class="checkbox-wrap">
          <input type="checkbox" id="anonymous">
          <label for="anonymous">익명으로 작성</label>
        </div>

        <br>

        <button type="submit" class="submit-btn">
          건의 등록하기
        </button>

      </form>
    </div>

    <!-- 건의 목록 -->
    <div class="card">
      <h2 class="list-title">📋 등록된 건의</h2>

      <div id="suggestionList">
        <div class="empty">
          아직 등록된 건의가 없습니다.
        </div>
      </div>
    </div>

    <footer>
      © 2026 School Suggestion Box
    </footer>

  </div>

  <script>
    const form = document.getElementById('suggestionForm');
    const suggestionList = document.getElementById('suggestionList');

    let suggestions = JSON.parse(localStorage.getItem('suggestions')) || [];

    function saveSuggestions(){
      localStorage.setItem('suggestions', JSON.stringify(suggestions));
    }

    function renderSuggestions(){

      if(suggestions.length === 0){
        suggestionList.innerHTML = `
          <div class="empty">
            아직 등록된 건의가 없습니다.
          </div>
        `;
        return;
      }

      suggestionList.innerHTML = '';

      suggestions.reverse().forEach((item, index) => {

        const div = document.createElement('div');
        div.className = 'suggestion';

        div.innerHTML = `
          <div class="suggestion-top">
            <span class="category">${item.category}</span>
            <span class="meta">
              작성자: ${item.name} | ${item.date}
            </span>
          </div>

          <h3>${item.title}</h3>

          <p>${item.content}</p>

          <button class="delete-btn" onclick="deleteSuggestion(${suggestions.length - 1 - index})">
            삭제
          </button>
        `;

        suggestionList.appendChild(div);
      });

      suggestions.reverse();
    }

    function deleteSuggestion(index){

      if(confirm('이 건의를 삭제하시겠습니까?')){
        suggestions.splice(index, 1);
        saveSuggestions();
        renderSuggestions();
      }
    }

    form.addEventListener('submit', function(e){
      e.preventDefault();

      const anonymous = document.getElementById('anonymous').checked;

      const newSuggestion = {
        name: anonymous
          ? '익명'
          : document.getElementById('name').value || '이름없음',

        category: document.getElementById('category').value,

        title: document.getElementById('title').value,

        content: document.getElementById('content').value,

        date: new Date().toLocaleString('ko-KR')
      };

      suggestions.push(newSuggestion);

      saveSuggestions();
      renderSuggestions();

      form.reset();

      alert('건의가 등록되었습니다!');
    });

    renderSuggestions();
  </script>

</body>
</html>
