<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>학교 온라인 건의함</title>

<style>
/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --primary:#2563eb;
  --border:#dbe4ee;
  --danger:#dc2626;
  --success:#16a34a;
  --shadow:0 8px 20px rgba(0,0,0,0.06);
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --sub:#cbd5e1;
  --border:#334155;
  --shadow:0 8px 20px rgba(0,0,0,0.3);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:
    Pretendard,
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
  transition:.3s;
  line-height:1.5;
}

.container{
  width:min(1100px,92%);
  margin:auto;
  padding:24px 0 60px;
}

/* =========================
   HEADER
========================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
  gap:12px;
  flex-wrap:wrap;
}

h1{
  font-size:2rem;
  font-weight:800;
}

.theme-btn{
  border:none;
  background:var(--primary);
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.theme-btn:hover{
  opacity:.9;
}

/* =========================
   STATS
========================= */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-bottom:28px;
}

.stat-card{
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  border-radius:18px;
  box-shadow:var(--shadow);
}

.stat-card h3{
  font-size:0.95rem;
  color:var(--sub);
  margin-bottom:10px;
}

.stat-card p{
  font-size:2rem;
  font-weight:800;
}

/* =========================
   FORM
========================= */
.form-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
  margin-bottom:28px;
  box-shadow:var(--shadow);
}

.form-grid{
  display:grid;
  gap:16px;
}

input,
textarea,
select{
  width:100%;
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  background:transparent;
  color:var(--text);
  font-size:1rem;
}

textarea{
  min-height:130px;
  resize:vertical;
}

input:focus,
textarea:focus,
select:focus{
  outline:2px solid var(--primary);
}

.submit-btn{
  border:none;
  background:var(--primary);
  color:white;
  padding:14px;
  border-radius:14px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.submit-btn:hover{
  transform:translateY(-1px);
}

/* =========================
   SEARCH
========================= */
.search-box{
  margin-bottom:24px;
}

/* =========================
   EMPTY
========================= */
.empty{
  text-align:center;
  padding:60px 20px;
  background:var(--card);
  border-radius:20px;
  border:1px dashed var(--border);
}

.empty h2{
  margin-top:12px;
  margin-bottom:8px;
}

/* =========================
   POSTS
========================= */
.posts{
  display:grid;
  gap:20px;
}

.post{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px;
  box-shadow:var(--shadow);
  transition:.2s;
}

.post:hover{
  transform:translateY(-3px);
}

.post-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:0.8rem;
  font-weight:700;
}

.category{
  background:#dbeafe;
  color:#1d4ed8;
}

.status{
  background:#dcfce7;
  color:#166534;
}

.post img{
  width:100%;
  border-radius:14px;
  margin-top:16px;
  max-height:280px;
  object-fit:cover;
}

.post-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  gap:12px;
  flex-wrap:wrap;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.action-btn{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.like-btn{
  background:#eff6ff;
  color:#1d4ed8;
}

.delete-btn{
  background:#fee2e2;
  color:#991b1b;
}

.status-select{
  max-width:160px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

  h1{
    font-size:1.6rem;
  }

  .post-footer{
    flex-direction:column;
    align-items:flex-start;
  }

  .actions{
    width:100%;
  }

  .action-btn{
    flex:1;
  }
}
</style>
</head>
<body>

<div class="container">

<header>
  <h1>🏫 학교 온라인 건의함</h1>

  <button
    class="theme-btn"
    id="themeToggle"
    aria-label="다크모드 전환">
    🌙 다크모드
  </button>
</header>

<!-- 통계 -->
<section class="stats">
  <div class="stat-card">
    <h3>전체 건의</h3>
    <p id="totalCount">0</p>
  </div>

  <div class="stat-card">
    <h3>해결 완료</h3>
    <p id="doneCount">0</p>
  </div>

  <div class="stat-card">
    <h3>총 좋아요</h3>
    <p id="likeCount">0</p>
  </div>
</section>

<!-- 작성 폼 -->
<section class="form-card">
  <form id="suggestionForm">

    <div class="form-grid">

      <input
        type="text"
        id="title"
        placeholder="제목을 입력하세요"
        required
      />

      <textarea
        id="content"
        placeholder="건의 내용을 자세히 작성해주세요"
        required
      ></textarea>

      <select id="category">
        <option value="시설">시설</option>
        <option value="급식">급식</option>
        <option value="수업">수업</option>
        <option value="행사">행사</option>
        <option value="기타">기타</option>
      </select>

      <input
        type="password"
        id="password"
        placeholder="삭제용 비밀번호 (4자 이상)"
        required
      />

      <input
        type="file"
        id="image"
        accept="image/*"
      />

      <button class="submit-btn">
        건의 등록하기
      </button>

    </div>

  </form>
</section>

<!-- 검색 -->
<div class="search-box">
  <input
    type="text"
    id="searchInput"
    placeholder="제목, 내용, 카테고리 검색"
  />
</div>

<!-- 게시글 -->
<section class="posts" id="posts"></section>

</div>

<script>
/* =========================
   STORAGE
========================= */
const STORAGE_KEY = "schoolSuggestions";

/* =========================
   ELEMENTS
========================= */
const form = document.getElementById("suggestionForm");
const postsEl = document.getElementById("posts");
const searchInput = document.getElementById("searchInput");

const totalCount = document.getElementById("totalCount");
const doneCount = document.getElementById("doneCount");
const likeCount = document.getElementById("likeCount");

/* =========================
   LOAD DATA
========================= */
let suggestions =
  JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

/* =========================
   SAVE
========================= */
function saveSuggestions(){
  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(suggestions)
  );
}

/* =========================
   UPDATE STATS
========================= */
function updateStats(){

  totalCount.textContent = suggestions.length;

  doneCount.textContent =
    suggestions.filter(
      item => item.status === "해결완료"
    ).length;

  likeCount.textContent =
    suggestions.reduce(
      (sum,item)=>sum + item.likes,
      0
    );
}

/* =========================
   RENDER
========================= */
function renderPosts(filter=""){

  postsEl.innerHTML = "";

  const filtered = suggestions.filter(item => {

    const text =
      (
        item.title +
        item.content +
        item.category
      ).toLowerCase();

    return text.includes(filter.toLowerCase());

  });

  if(filtered.length === 0){

    postsEl.innerHTML = `
      <div class="empty">
        <div style="font-size:3rem">📭</div>
        <h2>등록된 건의가 없습니다</h2>
        <p>첫 번째 건의를 등록해보세요.</p>
      </div>
    `;

    updateStats();
    return;
  }

  filtered.reverse().forEach(item => {

    const card = document.createElement("article");
    card.className = "post";

    card.innerHTML = `
      <div class="post-top">

        <div>
          <h2>${item.title}</h2>
          <small>${item.createdAt}</small>
        </div>

        <div class="badges">
          <span class="badge category">
            ${item.category}
          </span>

          <span class="badge status">
            ${item.status}
          </span>
        </div>

      </div>

      <p>${item.content}</p>

      ${
        item.image
        ? `<img src="${item.image}" alt="첨부 이미지"/>`
        : ""
      }

      <div class="post-footer">

        <div class="actions">

          <button
            class="action-btn like-btn"
            onclick="likePost(${item.id})">

            👍 좋아요 (${item.likes})

          </button>

          <button
            class="action-btn delete-btn"
            onclick="deletePost(${item.id})">

            🗑 삭제

          </button>

        </div>

        <select
          class="status-select"
          onchange="changeStatus(${item.id}, this.value)">

          <option
            value="접수됨"
            ${item.status==="접수됨"?"selected":""}>
            접수됨
          </option>

          <option
            value="검토중"
            ${item.status==="검토중"?"selected":""}>
            검토중
          </option>

          <option
            value="해결완료"
            ${item.status==="해결완료"?"selected":""}>
            해결완료
          </option>

        </select>

      </div>
    `;

    postsEl.appendChild(card);

  });

  updateStats();
}

/* =========================
   CREATE POST
========================= */
form.addEventListener("submit", async(e)=>{

  e.preventDefault();

  const title =
    document.getElementById("title").value.trim();

  const content =
    document.getElementById("content").value.trim();

  const category =
    document.getElementById("category").value;

  const password =
    document.getElementById("password").value.trim();

  const imageInput =
    document.getElementById("image");

  /* VALIDATION */
  if(title.length < 3){
    alert("제목은 3자 이상 입력해주세요.");
    return;
  }

  if(content.length < 10){
    alert("내용은 10자 이상 입력해주세요.");
    return;
  }

  if(password.length < 4){
    alert("비밀번호는 4자 이상이어야 합니다.");
    return;
  }

  let imageBase64 = "";

  if(imageInput.files[0]){

    const file = imageInput.files[0];

    imageBase64 =
      await toBase64(file);

  }

  const suggestion = {

    id:Date.now(),

    title,
    content,
    category,
    password,

    image:imageBase64,

    likes:0,

    status:"접수됨",

    createdAt:
      new Date().toLocaleString()

  };

  suggestions.push(suggestion);

  saveSuggestions();

  form.reset();

  renderPosts(searchInput.value);

});

/* =========================
   IMAGE CONVERT
========================= */
function toBase64(file){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = () => resolve(reader.result);

    reader.onerror = error => reject(error);

  });

}

/* =========================
   LIKE
========================= */
function likePost(id){

  const target =
    suggestions.find(item=>item.id===id);

  target.likes++;

  saveSuggestions();

  renderPosts(searchInput.value);

}

/* =========================
   DELETE
========================= */
function deletePost(id){

  const password =
    prompt("삭제 비밀번호를 입력하세요");

  if(password === null) return;

  const target =
    suggestions.find(item=>item.id===id);

  if(target.password !== password){

    alert("비밀번호가 일치하지 않습니다.");

    return;
  }

  suggestions =
    suggestions.filter(item=>item.id!==id);

  saveSuggestions();

  renderPosts(searchInput.value);

}

/* =========================
   STATUS
========================= */
function changeStatus(id,status){

  const target =
    suggestions.find(item=>item.id===id);

  target.status = status;

  saveSuggestions();

  renderPosts(searchInput.value);

}

/* =========================
   SEARCH
========================= */
searchInput.addEventListener("input",(e)=>{

  renderPosts(e.target.value);

});

/* =========================
   DARK MODE
========================= */
const themeToggle =
  document.getElementById("themeToggle");

if(localStorage.getItem("darkMode")==="true"){

  document.body.classList.add("dark");

}

themeToggle.addEventListener("click",()=>{

  document.body.classList.toggle("dark");

  localStorage.setItem(
    "darkMode",
    document.body.classList.contains("dark")
  );

});

/* =========================
   INIT
========================= */
renderPosts();
</script>

</body>
</html>
